# JPrequal Proxy Configuration

# Port the proxy listens on
port=8080

# Maximum probe pool size (must be less than the number of replicas)
max_size=16

# Number of probes fired per request (r_probe, may be fractional; must exceed rremove)
probing_rate=2

# Number of probes removed per request (r_remove, may be fractional)
rremove=1

# Delta parameter for Breuse calculation
delta=1.0

# Quantile of the RIF distribution above which a probe is considered hot (0=RIF-only, 1=latency-only)
q_rif=0.84

# Probes older than this are evicted from the pool
probe_staleness_ms=1000

# Comma-separated list of backend replicas (host:port)
replicas=localhost:9001,localhost:9002,localhost:9003,localhost:9004,localhost:9005,localhost:9006,localhost:9007,localhost:9008

# Http timeout for probe request
probe_timeout_ms=1000

# Http timeout for proxied client requests
request_timeout_ms=5000

# Maximum consecutive failures before a replica is considered dead
max_failures=5

# How often an unhealthy replica is re-probed so it can recover
recovery_interval_ms=5000

# Maximum retries on failure (idempotent methods only)
max_retries=2
