# JPrequal Proxy Configuration

# Port the proxy listens on
port=8080

# Maximum probe pool size
max_size=16

# Number of probes fired per request
probing_rate=2

# Number of probes removed per request
rremove=1

# Delta parameter for Breuse calculation
delta=1.0

# Comma-separated list of backend replicas (host:port)
replicas=localhost:9001,localhost:9002,localhost:9003
