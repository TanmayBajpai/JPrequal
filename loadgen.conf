# JPrequal Load Generator Configuration
#
# Any key here can be overridden on the command line, e.g.:
#   mvn exec:java -Dexec.mainClass="io.jprequal.loadgen.LoadGenerator" \
#       -Dexec.args="qps=500 pattern=sine"

# Target URL to send requests to
target=http://localhost:8080/work

# HTTP method (POST/PATCH bodies via the "body" key)
method=GET

# Optional request body
#body=

# Optional headers, semicolon-separated (Name: Value; Name2: Value2)
#headers=

# Load pattern: constant | ramp | sine | step | spike
#   constant: qps for the whole run
#   ramp:     min_qps -> max_qps linearly over duration_s
#   sine:     oscillates between min_qps and max_qps, starting at min_qps, with period period_s
#   step:     min_qps -> max_qps in "steps" equal levels over duration_s
#   spike:    qps baseline, bursting to max_qps for burst_s at the start of every period_s
pattern=spike

# Base rate in queries per second (constant rate; spike baseline)
qps=100

# Rate bounds for ramp/sine/step (max_qps is also the spike burst rate; defaults to qps)
min_qps=0
max_qps=200

# Cycle length for sine and spike patterns, seconds
period_s=30

# Burst length for the spike pattern, seconds
burst_s=5

# Number of levels for the step pattern
steps=5

# Measured run length, seconds
duration_s=60

# Warmup before measurement starts, seconds (excluded from the final summary)
warmup_s=5

# Arrival process: poisson (realistic, bursty) | uniform (evenly spaced)
arrival=poisson

# Per-request timeout, milliseconds (timeouts count as errors)
request_timeout_ms=5000

# How often progress is reported, seconds
report_interval_s=5

# Cap on concurrent in-flight requests; arrivals beyond it are dropped, not queued
max_in_flight=10000
